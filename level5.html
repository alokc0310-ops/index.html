<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Property</title>
    <style>
        #box1{ text-transform: uppercase;}
        #box2{ text-transform: lowercase;}
        #box3{ text-transform: capitalize;}
        #box4{ text-transform: none;}
    </style>
</head>
<body>
    <h3 id="box1" class="box">first line </h3>
    <h3 id="box2" class="box">second line</h3>
    <h3 id="box3" class="box">third line</h3>
    <h3 id="box4" class="box">fourth line</h3>
</body>
</html>
