<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Text decoration</title>
    <style>
     #first{
        background-color:blue;
        text-decoration:underline;

        text-decoration-style: dotted
     }  
     #Second{background-color:green;
        text-decoration:overline;
    text-decoration-style:double;
}
    #Third{
        background-color:yellow;
        text-decoration:line-through;
        text-decoration-style:dashed;
    }
    #Fourth{
        background-color:red;
        text-decoration:underline ;
        text-decoration-style:wavy ;
    }
        #al{
            text-decoration: none;
        }
      
    </style>
</head>
<body>
<h1 id="first">This is my first heading</h1>
<h2 id="Second">This is my Second heading</h2>
<h3 id="Third">This is my Third heading</h3>
<h4 id="Fourth">This is my Fourth heading</h4>
<a href="link.html  " id="al">link </a>

</body>
</html>
